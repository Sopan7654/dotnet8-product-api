version: '3.9'

services:
  # ── SQL Server ───────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productapi_db
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - productapi_net

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productapi_app
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=ProductApiDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      Jwt__Secret: "YourSuperSecretJwtKey_MustBe32CharsOrMore!!"
      Jwt__Issuer: "ProductApi"
      Jwt__Audience: "ProductApiClients"
      Jwt__AccessTokenMinutes: "15"
      Jwt__RefreshTokenDays: "7"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - productapi_net
    restart: unless-stopped

volumes:
  sqldata:

networks:
  productapi_net:
    driver: bridge
